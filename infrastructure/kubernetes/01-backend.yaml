apiVersion: apps/v1
kind: Deployment
metadata:
  name: pikh-backend
  namespace: pikh
  labels:
    app: pikh-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pikh-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pikh-backend
    spec:
      containers:
        - name: backend
          image: registry.digitalocean.com/pikh-registry/pikh-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: pikh-config
            - secretRef:
                name: pikh-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: pikh-backend
  namespace: pikh
spec:
  selector:
    app: pikh-backend
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
