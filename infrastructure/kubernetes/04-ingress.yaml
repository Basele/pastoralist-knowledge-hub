apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pikh-ingress
  namespace: pikh
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://pastoralistknowledge.org"
spec:
  tls:
    - hosts:
        - pastoralistknowledge.org
        - www.pastoralistknowledge.org
        - api.pastoralistknowledge.org
      secretName: pikh-tls
  rules:
    - host: pastoralistknowledge.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pikh-frontend
                port:
                  number: 80
    - host: www.pastoralistknowledge.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pikh-frontend
                port:
                  number: 80
    - host: api.pastoralistknowledge.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pikh-backend
                port:
                  number: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pikh-backend-hpa
  namespace: pikh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pikh-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
